name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pandas numpy matplotlib scipy Pillow python-pptx openpyxl
          pip install llama-cpp-python
        shell: cmd
        
      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name CrabAssistant --collect-all llama_cpp --hidden-import llama_cpp crab_assistant.py
        shell: cmd
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrabAssistant-Windows
          path: dist/CrabAssistant.exe
