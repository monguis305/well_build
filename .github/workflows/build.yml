name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install llama-cpp-python pandas numpy matplotlib scipy Pillow python-pptx openpyxl pyinstaller
    
    - name: Create facts.xlsx
      run: |
        python -c "
import pandas as pd
df = pd.DataFrame({'fact': ['Нефть образовалась из древних организмов', 'Первая нефтяная скважина - 1859 год', 'Россия - лидер по добыче']})
df.to_excel('facts.xlsx', index=False)
"
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "CrabAssistant" --add-data "facts.xlsx;." --hidden-import llama_cpp --hidden-import pandas --hidden-import numpy --hidden-import matplotlib --hidden-import scipy --hidden-import PIL --hidden-import pptx --hidden-import openpyxl crab_assistant.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CrabAssistant-Windows
        path: dist/CrabAssistant.exe
