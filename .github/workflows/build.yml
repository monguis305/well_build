name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install ALL dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas numpy matplotlib scipy Pillow python-pptx openpyxl llama-cpp-python
      shell: cmd
    
    - name: Create facts.xlsx
      run: python -c "import pandas as pd; pd.DataFrame({'fact': ['test']}).to_excel('facts.xlsx')"
      shell: cmd
    
    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --name "CrabAssistant" --add-data "facts.xlsx;." --hidden-import pandas --hidden-import numpy --hidden-import matplotlib --hidden-import scipy --hidden-import PIL --hidden-import pptx --hidden-import openpyxl --hidden-import llama_cpp crab_assistant.py
      shell: cmd
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CrabAssistant-Windows
        path: dist/CrabAssistant.exe
