name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install
        run: pip install pyinstaller pandas numpy matplotlib scipy Pillow python-pptx openpyxl
        
      - name: Build
        run: pyinstaller --onefile --windowed --name CrabAssistant crab_assistant.py
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CrabAssistant
          path: dist/CrabAssistant.exe
