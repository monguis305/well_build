name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # чтобы можно было запустить вручную

jobs:
  build:
    runs-on: windows-latest  # собираем под Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # стабильная версия

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install numpy pandas matplotlib scipy PyQt5 openpyxl
        
        # Устанавливаем xtgeo без компиляции (есть готовые колеса)
        pip install xtgeo --only-binary=xtgeo

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed `
          --name="MapViewer" `
          --hidden-import=scipy.interpolate `
          --hidden-import=scipy._lib `
          --hidden-import=PyQt5.sip `
          --collect-all=xtgeo `
          map_viewer.py

    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: MapViewer.exe
        path: dist/MapViewer.exe
        compression-level: 0  # без сжатия для скорости
